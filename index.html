<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>音感練習 Pitch Ear</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14171C">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --bg: #14171C;
    --bg-raised: #1B1F26;
    --line: #2A2F38;
    --text: #EDEAE3;
    --text-dim: #8B9099;
    --amber: #E8B84B;
    --rose: #C0596E;
    --teal: #4FA8A0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    min-height: 100vh;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 0 8px;
    text-align: left;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--teal);
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 28px;
    margin: 4px 0 0;
    letter-spacing: -0.01em;
  }

  .stats {
    display: flex;
    gap: 18px;
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }
  .stats b { color: var(--text); font-weight: 600; }

  /* -- Waveform, the signature element -- */
  .stage {
    margin-top: 22px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 20px 18px;
  }

  .wave-wrap {
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg#wave path {
    fill: none;
    stroke: var(--teal);
    stroke-width: 2;
    opacity: 0.35;
    transition: opacity 0.2s ease;
  }
  svg#wave.playing path { opacity: 1; }

  .play-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 6px;
  }

  .play-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: var(--amber);
    color: #1A1305;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  .play-btn:active { transform: scale(0.98); filter: brightness(0.95); }
  .play-btn:disabled { opacity: 0.5; }

  .replay-note {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
  }

  /* -- Options -- */
  .options {
    margin-top: 22px;
    display: flex;
    flex-direction: row;
    gap: 8px;
  }

  .opt-btn {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 8px 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--bg-raised);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .opt-btn:active { transform: scale(0.99); }
  .opt-btn:disabled { cursor: default; }

  .opt-btn .staff-svg {
    width: 100%;
  }
  .opt-btn .staff-svg svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .opt-btn .badge {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.4;
  }

  .opt-btn.correct {
    border-color: var(--teal);
    background: rgba(79,168,160,0.14);
  }
  .opt-btn.correct .badge { color: var(--teal); }

  .opt-btn.wrong {
    border-color: var(--rose);
    background: rgba(192,89,110,0.12);
  }
  .opt-btn.wrong .badge { color: var(--rose); }

  /* -- Feedback -- */
  .feedback {
    margin-top: 16px;
    min-height: 26px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 17px;
    font-weight: 500;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .feedback.show { opacity: 1; }
  .feedback.good { color: var(--teal); }
  .feedback.bad { color: var(--rose); }

  .next-btn {
    margin-top: 14px;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .next-btn.show { opacity: 1; pointer-events: auto; }

  /* -- Difficulty -- */
  .settings {
    margin-top: auto;
    padding-top: 24px;
    padding-bottom: 20px;
  }

  .settings-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .diff-row {
    display: flex;
    gap: 8px;
  }

  .diff-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-raised);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .diff-btn.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(232,184,75,0.08);
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="eyebrow">Ear Training · 離線音感練習</div>
    <h1>這是哪個音？</h1>
    <div class="stats">
      <div>正確 <b id="statCorrect">0</b></div>
      <div>已答 <b id="statTotal">0</b></div>
      <div>連續 <b id="statStreak">0</b></div>
    </div>
  </header>

  <div class="stage">
    <div class="wave-wrap">
      <svg id="wave" viewBox="0 0 300 80" preserveAspectRatio="none">
        <path d="M0,40 Q37.5,10 75,40 T150,40 T225,40 T300,40" />
      </svg>
    </div>
    <div class="play-row">
      <button class="play-btn" id="playBtn">▶ 播放音高</button>
    </div>
    <div class="replay-note" id="replayNote">點擊播放，仔細聽</div>
  </div>

  <div class="options" id="options"></div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn">下一題 →</button>

  <div class="settings">
    <div class="settings-label">難度</div>
    <div class="diff-row" id="diffRow">
      <button class="diff-btn" data-diff="easy">簡單</button>
      <button class="diff-btn" data-diff="medium">中等</button>
      <button class="diff-btn" data-diff="hard">困難</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- 1. 建立音高資料表 (Web Audio 用) ----------
  // A4 = 440Hz 為基準，用十二平均律公式推算兩個八度的音
  // f = 440 * 2^((n-49)/12)，n 為鋼琴鍵編號 (A4 = 49)
  const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

  function noteAt(midiRelativeToA4) {
    // midiRelativeToA4: A4 = 0
    const freq = 440 * Math.pow(2, midiRelativeToA4 / 12);
    return freq;
  }

  // 五線譜位置對照表:每個半音對應的「唱名階梯值」與是否為升記號
  // 唱名階梯值只跟字母 C D E F G A B 有關，跟升降記號無關
  // 例如 C 和 C# 畫在譜表上是同一個位置，只是 C# 前面多畫一個 ♯
  const LETTER_OF_PC =  [0,    0,   1,   1,   2,   3,   3,   4,   4,   5,   5,   6];
  const SHARP_OF_PC   = [false,true,false,true,false,false,true,false,true,false,true,false];

  // 建立 C3 ~ B5 三個八度的音表 (共 36 個音)
  const NOTES = [];
  for (let i = -21; i <= 14; i++) {
    // i 相對於 A4 的半音距離
    const freq = noteAt(i);
    const midi = 69 + i; // A4 的 MIDI number 是 69
    const pc = midi % 12; // pitch class, 0~11
    const octave = Math.floor(midi / 12) - 1;
    const name = NOTE_NAMES[pc] + octave;

    // diatonicIndex: 字母階梯值 + 8度 * 7，數字每 +1 代表在譜表上往上移半格(線→間 或 間→線)
    const diatonicIndex = LETTER_OF_PC[pc] + 7 * octave;
    const accidental = SHARP_OF_PC[pc]; // 是否需要畫升記號 ♯

    NOTES.push({ name, freq, semitone: i, diatonicIndex, accidental });
  }

  // ---------- 2. Web Audio 合成正弦波 ----------
  let audioCtx = null;
  function getCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, duration = 1.1) {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    // ADSR 簡化版包絡：避免 click 聲，開頭/結尾做淡入淡出
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.28, now + 0.03);
    gain.gain.setValueAtTime(0.28, now + duration - 0.15);
    gain.gain.linearRampToValueAtTime(0, now + duration);

    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + duration + 0.05);

    return duration * 1000;
  }

  // ---------- 3. 遊戲狀態 ----------
  let difficulty = "easy";
  const DIFF_GAP = { easy: [5, 12], medium: [2, 4], hard: [1, 2] };

  let current = null;   // 正確答案 note object
  let options = [];      // 三個選項
  let answered = false;
  let stats = { correct: 0, total: 0, streak: 0 };

  function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function buildQuestion() {
    current = pickRandom(NOTES);
    const [minGap, maxGap] = DIFF_GAP[difficulty];

    const pool = NOTES.filter(n => {
      const d = Math.abs(n.semitone - current.semitone);
      return d >= minGap && d <= maxGap;
    });

    // 干擾音不足時，逐步放寬範圍，確保一定湊得到兩個
    let distractorPool = pool;
    let widenBy = 1;
    while (distractorPool.length < 2 && widenBy < 24) {
      distractorPool = NOTES.filter(n => {
        const d = Math.abs(n.semitone - current.semitone);
        return d >= 1 && d <= (maxGap + widenBy);
      });
      widenBy++;
    }

    const distractors = [];
    const usedIdx = new Set();
    while (distractors.length < 2 && distractors.length < distractorPool.length) {
      const cand = pickRandom(distractorPool);
      if (!usedIdx.has(cand.name)) {
        usedIdx.add(cand.name);
        distractors.push(cand);
      }
    }

    options = [current, ...distractors].sort(() => Math.random() - 0.5);
    answered = false;
    renderOptions();
    clearFeedback();
    document.getElementById("replayNote").textContent = "點擊播放，仔細聽";
    document.getElementById("nextBtn").classList.remove("show");
  }

  // ---------- 4. 五線譜 (大譜表) 繪製 ----------
  // 座標系統說明：
  // - 高音譜表最下面那條線是 E4 (diatonicIndex=30)
  // - 低音譜表最上面那條線是 A3 (diatonicIndex=26)
  // - 中央 C (diatonicIndex=28) 剛好在兩個譜表正中間，需要畫一條加線
  const SVG_W = 140, SVG_H = 200;
  const STAFF_X1 = 26, STAFF_X2 = 114;
  const NOTE_X = 88;
  const HALF_STEP = 5;           // 每個唱名階梯值對應的像素距離
  const TREBLE_BOTTOM_Y = 85;    // 高音譜表最下線 (E4) 的 y 座標
  const BASS_TOP_Y = 135;        // 低音譜表最上線 (A3) 的 y 座標

  const TREBLE_LINES = [30, 32, 34, 36, 38]; // E4 G4 B4 D5 F5
  const BASS_LINES = [18, 20, 22, 24, 26];   // G2 B2 D3 F3 A3

  function yForIndex(i) {
    if (i >= 30) return TREBLE_BOTTOM_Y - (i - 30) * HALF_STEP;
    if (i <= 26) return BASS_TOP_Y - (i - 26) * HALF_STEP;
    // 27, 28, 29：介於兩個譜表中間的區域，用內插法連接
    return BASS_TOP_Y + (i - 26) / 4 * (TREBLE_BOTTOM_Y - BASS_TOP_Y);
  }

  function noteStaffSVG(note) {
    const y = yForIndex(note.diatonicIndex);
    let svg = `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg">`;
    const strokeColor = "var(--text-dim)";

    // 高音譜表 5 條線
    TREBLE_LINES.forEach(li => {
      const ly = yForIndex(li);
      svg += `<line x1="${STAFF_X1}" y1="${ly}" x2="${STAFF_X2}" y2="${ly}" stroke="${strokeColor}" stroke-width="1.2"/>`;
    });
    // 低音譜表 5 條線
    BASS_LINES.forEach(li => {
      const ly = yForIndex(li);
      svg += `<line x1="${STAFF_X1}" y1="${ly}" x2="${STAFF_X2}" y2="${ly}" stroke="${strokeColor}" stroke-width="1.2"/>`;
    });

    // 譜號 (用 Unicode 符號簡化繪製)
    svg += `<text x="${STAFF_X1 + 6}" y="${yForIndex(32) + 13}" font-size="34" fill="var(--text-dim)">𝄞</text>`;
    svg += `<text x="${STAFF_X1 + 8}" y="${yForIndex(24) + 8}" font-size="20" fill="var(--text-dim)">𝄢</text>`;

    // 加線 (ledger lines)：中央 C、或超出譜表範圍時需要畫
    const ledgerW = 20;
    if (note.diatonicIndex === 28) {
      // 中央 C 的加線
      svg += `<line x1="${NOTE_X - ledgerW/2}" y1="${y}" x2="${NOTE_X + ledgerW/2}" y2="${y}" stroke="${strokeColor}" stroke-width="1.2"/>`;
    } else if (note.diatonicIndex > 38) {
      // 高音譜表上方的加線
      for (let j = 40; j <= note.diatonicIndex; j += 2) {
        const ly = yForIndex(j);
        svg += `<line x1="${NOTE_X - ledgerW/2}" y1="${ly}" x2="${NOTE_X + ledgerW/2}" y2="${ly}" stroke="${strokeColor}" stroke-width="1.2"/>`;
      }
    } else if (note.diatonicIndex < 18) {
      // 低音譜表下方的加線
      for (let j = 16; j >= note.diatonicIndex; j -= 2) {
        const ly = yForIndex(j);
        svg += `<line x1="${NOTE_X - ledgerW/2}" y1="${ly}" x2="${NOTE_X + ledgerW/2}" y2="${ly}" stroke="${strokeColor}" stroke-width="1.2"/>`;
      }
    }

    // 升記號 ♯
    if (note.accidental) {
      svg += `<text x="${NOTE_X - 22}" y="${y + 6}" font-size="17" fill="var(--text)">♯</text>`;
    }

    // 音符本體 (橢圓形，稍微傾斜比較像手寫音符)
    svg += `<ellipse cx="${NOTE_X}" cy="${y}" rx="7.5" ry="5.6" fill="var(--text)" transform="rotate(-18 ${NOTE_X} ${y})"/>`;

    svg += `</svg>`;
    return svg;
  }

  // ---------- 5. 畫面渲染 ----------
  const optionsEl = document.getElementById("options");
  const feedbackEl = document.getElementById("feedback");
  const waveEl = document.getElementById("wave");
  const playBtn = document.getElementById("playBtn");
  const nextBtn = document.getElementById("nextBtn");

  function renderOptions() {
    optionsEl.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "opt-btn";
      btn.dataset.name = opt.name;
      btn.innerHTML = `<span class="staff-svg">${noteStaffSVG(opt)}</span><span class="badge"></span>`;
      btn.addEventListener("click", () => handleAnswer(opt, btn));
      optionsEl.appendChild(btn);
    });
  }

  function handleAnswer(opt, btnEl) {
    if (answered) return;
    answered = true;
    stats.total++;

    const isCorrect = opt.name === current.name;
    if (isCorrect) {
      stats.correct++;
      stats.streak++;
    } else {
      stats.streak = 0;
    }
    updateStats();

    [...optionsEl.children].forEach(child => {
      const label = child.dataset.name;
      child.disabled = true;
      if (label === current.name) {
        child.classList.add("correct");
        child.querySelector(".badge").textContent = `正確答案 · ${label}`;
      } else if (child === btnEl) {
        child.classList.add("wrong");
        child.querySelector(".badge").textContent = `你的選擇 · ${label}`;
      }
    });

    feedbackEl.textContent = isCorrect ? "✅ 答對了！耳朵很準" : `❌ 答錯了，正確答案是 ${current.name}`;
    feedbackEl.className = "feedback show " + (isCorrect ? "good" : "bad");
    nextBtn.classList.add("show");
  }

  function clearFeedback() {
    feedbackEl.className = "feedback";
    feedbackEl.textContent = "";
  }

  function updateStats() {
    document.getElementById("statCorrect").textContent = stats.correct;
    document.getElementById("statTotal").textContent = stats.total;
    document.getElementById("statStreak").textContent = stats.streak;
  }

  // ---------- 6. 事件綁定 ----------
  playBtn.addEventListener("click", () => {
    playBtn.disabled = true;
    waveEl.classList.add("playing");
    const ms = playTone(current.freq);
    document.getElementById("replayNote").textContent = "播放中…";
    setTimeout(() => {
      waveEl.classList.remove("playing");
      playBtn.disabled = false;
      document.getElementById("replayNote").textContent = "可再次點擊重播";
    }, ms);
  });

  nextBtn.addEventListener("click", buildQuestion);

  document.getElementById("diffRow").addEventListener("click", (e) => {
    const btn = e.target.closest(".diff-btn");
    if (!btn) return;
    difficulty = btn.dataset.diff;
    [...document.querySelectorAll(".diff-btn")].forEach(b => b.classList.toggle("active", b === btn));
    buildQuestion();
  });

  // 預設難度
  document.querySelector('.diff-btn[data-diff="easy"]').classList.add("active");

  // ---------- 7. PWA: 註冊 service worker (離線支援) ----------
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {
        // 若尚未部署 service-worker.js，靜默失敗，不影響主功能
      });
    });
  }

  // ---------- 8. 啟動 ----------
  buildQuestion();
  updateStats();
})();
</script>
</body>
</html>
